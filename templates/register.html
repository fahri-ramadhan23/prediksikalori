<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Daftar Akun • AI Burn Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body class="p-4 md:p-8 flex items-center justify-center min-h-screen">
    <div class="w-full max-w-md space-y-6">
      
      <div class="text-center">
        <div class="inline-block p-4 bg-rose-500/20 rounded-2xl text-4xl mb-4">🔥</div>
        <h1 class="header-font text-3xl font-bold text-white">AI Burn Predictor</h1>
        <p class="text-rose-400 text-sm">Buat akun untuk melacak pembakaran kalori Anda</p>
      </div>

      <div class="glass p-8 space-y-6 relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-5 text-7xl">📝</div>
        
        <h2 class="text-xl font-bold text-white mb-2">Daftar Baru</h2>

        {% if error %}
        <div class="p-3 bg-red-500/10 border border-red-500/30 rounded-xl text-red-400 text-sm flex items-center gap-2">
          <span>⚠️</span>
          <span>{{ error }}</span>
        </div>
        {% endif %}

        <form action="{{ url_for('register') }}" method="POST" class="space-y-4">
          <div class="space-y-2">
            <label for="fullname" class="text-slate-300 font-medium text-sm">Nama Lengkap</label>
            <input type="text" id="fullname" name="fullname" required
              class="w-full bg-slate-800/80 text-white rounded-lg p-3 border border-slate-700 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all"
              placeholder="Masukkan nama lengkap Anda">
          </div>

          <div class="space-y-2">
            <label for="username" class="text-slate-300 font-medium text-sm">Username</label>
            <input type="text" id="username" name="username" required
              class="w-full bg-slate-800/80 text-white rounded-lg p-3 border border-slate-700 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all"
              placeholder="Pilih username unik">
          </div>

          <div class="space-y-2">
            <label for="password" class="text-slate-300 font-medium text-sm">Password</label>
            <input type="password" id="password" name="password" required
              class="w-full bg-slate-800/80 text-white rounded-lg p-3 border border-slate-700 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all"
              placeholder="Pilih password aman">
          </div>

          <div class="space-y-2">
            <label for="confirm_password" class="text-slate-300 font-medium text-sm">Konfirmasi Password</label>
            <input type="password" id="confirm_password" name="confirm_password" required
              class="w-full bg-slate-800/80 text-white rounded-lg p-3 border border-slate-700 focus:border-rose-500 focus:ring-1 focus:ring-rose-500 outline-none transition-all"
              placeholder="Ketik ulang password">
          </div>

          <button type="submit" 
            class="w-full py-3 bg-rose-600 hover:bg-rose-500 text-white font-bold rounded-xl transition-all shadow-lg shadow-rose-900/20 active:scale-95 flex items-center justify-center gap-2 mt-6">
            <span>Daftar Akun</span>
            <span>✨</span>
          </button>
        </form>
      </div>

      <p class="text-center text-slate-400 text-sm">
        Sudah punya akun? 
        <a href="{{ url_for('login') }}" class="text-rose-400 hover:text-rose-300 font-semibold transition-all">Login di Sini</a>
      </p>

    </div>
  </body>
</html>
